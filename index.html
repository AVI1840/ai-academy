<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המקפצה — אקדמיית AI למגזר הציבורי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0e1a;color:#e8eaf0;padding:24px}
.container{text-align:center;max-width:700px}
h1{font-size:2.4rem;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,#fff 40%,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#8b95a8;font-size:1.05rem;margin-bottom:40px;line-height:1.7}
.cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.card{flex:1;min-width:260px;max-width:320px;border-radius:20px;padding:36px 28px;text-decoration:none;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:16px}
.card-light{background:#faf9f5;border:2px solid #e8e6dc;color:#141413}
.card-light:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(217,119,87,.15);border-color:#d97757}
.card-dark{background:#131a2e;border:2px solid rgba(255,255,255,.07);color:#e8eaf0}
.card-dark:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(59,130,246,.2);border-color:#3b82f6}
.card-icon{font-size:2.4rem}
.card h2{font-size:1.2rem;font-weight:700}
.card span{font-size:.88rem;opacity:.7;line-height:1.5}
.footer{margin-top:48px;font-size:.82rem;color:#8b95a8;line-height:1.8}
@media(max-width:600px){h1{font-size:1.8rem}.cards{flex-direction:column;align-items:center}}
</style>
</head>
<body>
<div class="container">
<div style="font-size:2rem;margin-bottom:16px">🚀</div>
<h1>המקפצה</h1>
<p>אקדמיית AI למובילי המגזר הציבורי — בחרו גרסה</p>
<div class="cards">
<a href="site/index.html" class="card card-light">
<div class="card-icon">☀️</div>
<h2>גרסה בהירה</h2>
<span>עיצוב נקי ומינימליסטי<br>קריאה נוחה ומוכרת</span>
</a>
<a href="site2/index.html" class="card card-dark">
<div class="card-icon">🌙</div>
<h2>גרסה כהה — Premium</h2>
<span>עיצוב כחול חדשני<br>חוויה מתקדמת ומרשימה</span>
</a>
</div>
<div class="footer">
אביעד יצחקי, מוביל AI ושותפויות, מינהלי גמלאות ביטוח לאומי<br>
מבוסס על Anthropic ו-OpenAI © 2025
</div>
</div>
</body>
</html>
