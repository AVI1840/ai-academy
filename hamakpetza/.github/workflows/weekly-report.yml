name: דוח שבועי — המקפצה

on:
  schedule:
    # כל יום ראשון בשעה 08:00 (ישראל קיץ = UTC+3 → 05:00 UTC)
    - cron: '0 5 * * 0'
  workflow_dispatch: # הפעלה ידנית מ-GitHub Actions

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Generate weekly report
        uses: actions/github-script@v7
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        with:
          script: |
            const dbUrl = process.env.FIREBASE_DB_URL;
            if (!dbUrl) {
              core.warning('FIREBASE_DB_URL לא מוגדר — דלג על הדוח');
              return;
            }

            // ── Fetch data from Firebase ──────────────────────────
            async function get(path) {
              const res = await fetch(`${dbUrl}/${path}.json`);
              return res.ok ? res.json() : null;
            }

            const [globalStats, dailyActive] = await Promise.all([
              get('globalStats'),
              get('dailyActive'),
            ]);

            const totalVisitors = globalStats?.totalVisitors ?? 0;
            const totalLessons  = globalStats?.totalLessonsCompleted ?? 0;

            // ── Weekly active (last 7 days) ───────────────────────
            let weeklyActive = 0;
            if (dailyActive) {
              const today = new Date();
              for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const key = d.toISOString().slice(0, 10);
                weeklyActive += dailyActive[key] ?? 0;
              }
            }

            // ── Daily breakdown table (last 7 days) ──────────────
            const rows = [];
            const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
            for (let i = 6; i >= 0; i--) {
              const d = new Date();
              d.setDate(d.getDate() - i);
              const key  = d.toISOString().slice(0, 10);
              const count = dailyActive?.[key] ?? 0;
              const dayName = days[d.getDay()];
              const bar = '█'.repeat(Math.min(count, 20)) + (count > 20 ? `…(${count})` : '');
              rows.push(`| ${key} (${dayName}) | ${count} | ${bar} |`);
            }

            // ── Build issue body ──────────────────────────────────
            const weekStart = new Date();
            weekStart.setDate(weekStart.getDate() - 6);
            const weekLabel = `${weekStart.toISOString().slice(0,10)} – ${new Date().toISOString().slice(0,10)}`;

            const body = [
              `## 📊 דוח שבועי — המקפצה`,
              `**שבוע:** ${weekLabel}`,
              ``,
              `### סיכום כולל`,
              `| מדד | ערך |`,
              `|---|---|`,
              `| 👥 סה"כ מבקרים ייחודיים | **${totalVisitors.toLocaleString('he-IL')}** |`,
              `| 🎓 סה"כ שיעורים שהושלמו | **${totalLessons.toLocaleString('he-IL')}** |`,
              `| 📅 מבקרים שבוע זה | **${weeklyActive.toLocaleString('he-IL')}** |`,
              ``,
              `### פעילות יומית (7 ימים אחרונים)`,
              `| תאריך | כניסות | גרף |`,
              `|---|---|---|`,
              ...rows,
              ``,
              `---`,
              `*דוח זה נוצר אוטומטית כל יום ראשון · [המקפצה](https://avi1840.github.io/ai-academy/)*`,
            ].join('\n');

            const title = `📊 דוח שבועי — ${weekLabel}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              labels: ['analytics', 'weekly-report'],
            });

            console.log(`✅ Issue created: ${title}`);
